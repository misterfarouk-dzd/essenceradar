name: Fetch Prix Carburants

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data
        run: |
          curl -s "https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=500&timezone=Europe/Paris" -o data.json
          echo "Done: $(wc -c < data.json) bytes"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update data $(date -u '+%Y-%m-%d %H:%M')"
          git push
